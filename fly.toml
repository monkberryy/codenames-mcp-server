# fly launch will set the app name; PUBLIC_URL via: fly secrets set PUBLIC_URL=https://<app>.fly.dev
[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
