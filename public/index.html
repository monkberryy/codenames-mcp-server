<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codenames — Field Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Staatliches&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0E1417;
    --panel: #131C20;
    --paper: #E9E2CF;
    --paper-ink: #26221A;
    --agent: #2E8F63;
    --dust: #9A8F79;
    --assassin: #17171A;
    --seal: #C0392B;
    --amber: #F0A83C;
    --line: #24313A;
    --text: #C9D4D8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-size: 14px;
    display: flex;
    justify-content: center;
  }
  .app { width: 100%; max-width: 640px; padding: 12px 12px 24px; }

  header {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 8px; padding: 6px 2px 10px; border-bottom: 1px solid var(--line);
  }
  .stamp {
    font-family: "Staatliches", sans-serif;
    font-size: 22px; letter-spacing: 2px; color: var(--paper);
  }
  .stamp small { color: var(--amber); font-size: 22px; }
  .meters { display: flex; gap: 14px; font-size: 12px; color: var(--dust); white-space: nowrap; }
  .meters b { color: var(--text); font-weight: 600; }
  .role { font-size: 10px; letter-spacing: 2px; color: var(--amber); padding: 4px 2px 0; }

  .tx {
    margin: 12px 0; padding: 10px 12px;
    background: var(--panel); border: 1px solid var(--line); border-left: 3px solid var(--amber);
    min-height: 58px;
  }
  .tx .label { font-size: 10px; letter-spacing: 3px; color: var(--dust); }
  .tx .line {
    font-family: "Staatliches", sans-serif; font-size: 30px; letter-spacing: 3px;
    color: var(--amber); text-shadow: 0 0 14px rgba(240,168,60,0.25); min-height: 34px;
  }
  .tx .line .cursor { animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .tx.idle .line { color: var(--dust); text-shadow: none; font-size: 20px; padding-top: 5px; }

  /* Clue form (human spymaster mode) */
  .clueform { display: none; gap: 8px; margin: 0 0 12px; }
  .clueform.show { display: flex; }
  .clueform input {
    flex: 1; min-width: 0; background: var(--panel); border: 1px solid var(--line);
    color: var(--amber); font-family: "Staatliches", sans-serif; font-size: 22px;
    letter-spacing: 2px; padding: 8px 10px; border-radius: 3px; text-transform: uppercase;
  }
  .clueform select {
    background: var(--panel); border: 1px solid var(--line); color: var(--amber);
    font-family: "Staatliches", sans-serif; font-size: 22px; padding: 8px; border-radius: 3px;
  }
  .clueform button {
    padding: 8px 14px; font-family: "Staatliches", sans-serif; font-size: 18px;
    letter-spacing: 2px; background: var(--amber); color: #1B1409;
    border: 0; border-radius: 3px; cursor: pointer;
  }

  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
  .card { perspective: 600px; height: 62px; }
  .card button {
    width: 100%; height: 100%; border: 0; background: transparent;
    cursor: pointer; position: relative; transform-style: preserve-3d;
    transition: transform 0.5s;
    font-family: inherit;
  }
  .card button:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }
  .face {
    position: absolute; inset: 0; backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
    border-radius: 3px; font-weight: 600; font-size: 11.5px; letter-spacing: 0.5px;
    padding: 2px; overflow: hidden;
  }
  .face.front { background: var(--paper); color: var(--paper-ink); border-bottom: 3px solid #CBC2A8; }
  .face.back { transform: rotateY(180deg); color: #F3EFE4; flex-direction: column; gap: 2px; }
  .card.revealed button { transform: rotateY(180deg); cursor: default; }
  .card.armed .face.front { outline: 2px solid var(--amber); outline-offset: -2px; }
  .back.agent { background: var(--agent); }
  .back.neutral { background: var(--dust); color: #2B2721; }
  .back.assassin { background: var(--assassin); box-shadow: inset 0 0 0 2px var(--seal); color: var(--seal); }
  .face .sym { font-size: 15px; line-height: 1; }
  .card.dim .face.front { opacity: 0.55; }

  /* Spymaster key marks on unrevealed cards */
  .card.key-agent .face.front { border-bottom-color: var(--agent); box-shadow: inset 0 -3px 0 var(--agent); }
  .card.key-assassin .face.front { border-bottom-color: var(--seal); box-shadow: inset 0 -3px 0 var(--seal); background: #E3D3C4; }
  .card.key-neutral .face.front { opacity: 0.9; }

  .controls { display: flex; gap: 8px; margin-top: 12px; }
  .controls button {
    flex: 1; padding: 10px; font-family: "Staatliches", sans-serif; font-size: 17px;
    letter-spacing: 2px; background: transparent; color: var(--amber);
    border: 1px solid var(--amber); border-radius: 3px; cursor: pointer;
  }
  .controls button:disabled { color: var(--line); border-color: var(--line); cursor: default; }
  .hint { margin-top: 10px; font-size: 12px; color: var(--dust); text-align: center; min-height: 16px; }
  .log { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 8px; font-size: 12px; color: var(--dust); }
  .log div { padding: 2px 0; }
  .log div:last-child { color: var(--text); }

  .banner {
    display: none; margin: 14px 0 0; padding: 14px; text-align: center;
    font-family: "Staatliches", sans-serif; font-size: 26px; letter-spacing: 3px;
    border: 1px solid var(--line); border-radius: 3px;
  }
  .banner.won { display: block; color: var(--agent); border-color: var(--agent); }
  .banner.lost { display: block; color: var(--seal); border-color: var(--seal); }
  .banner small { display: block; font-family: "IBM Plex Mono", monospace; font-size: 12px; letter-spacing: 0; color: var(--dust); margin-top: 4px; }

  .error { color: var(--seal); text-align: center; padding: 40px 20px; font-size: 13px; }

  @media (prefers-reduced-motion: reduce) {
    .card button { transition: none; }
    .tx .line .cursor { animation: none; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="stamp">CODE<small>NAMES</small></div>
    <div class="meters">
      <span>AGENTS <b id="agents">–</b></span>
      <span>CLUES <b id="turns">–</b></span>
    </div>
  </header>
  <div class="role" id="role"></div>

  <div class="tx idle" id="tx">
    <div class="label" id="txlabel">TRANSMISSION FROM SPYMASTER</div>
    <div class="line" id="txline">awaiting clue…<span class="cursor">▌</span></div>
  </div>

  <div class="clueform" id="clueform">
    <input id="cluein" type="text" placeholder="YOUR CLUE" maxlength="40" autocomplete="off">
    <select id="countin"></select>
    <button id="transmit">SEND</button>
  </div>

  <div class="banner" id="banner"></div>
  <div class="grid" id="grid"></div>

  <div class="controls">
    <button id="pass" disabled>STOP GUESSING</button>
  </div>
  <div class="hint" id="hint"></div>
  <div class="log" id="log"></div>
</div>

<script>
(function () {
  const code = decodeURIComponent(location.pathname.split("/").pop() || "");
  const $ = (id) => document.getElementById(id);
  const SYM = { agent: "★", neutral: "○", assassin: "☠" };

  const sel = $("countin");
  for (let i = 0; i <= 9; i++) {
    const o = document.createElement("option");
    o.value = i; o.textContent = i === 0 ? "∞" : i;
    if (i === 2) o.selected = true;
    sel.appendChild(o);
  }

  let state = null;
  let armed = null;
  let shownClue = "";
  let typing = false;
  const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

  function typeClue(text) {
    const line = $("txline");
    $("tx").classList.remove("idle");
    if (reduceMotion) { line.textContent = text; return; }
    typing = true;
    line.innerHTML = '<span class="cursor">▌</span>';
    let i = 0;
    const tick = () => {
      if (i <= text.length) {
        line.innerHTML = text.slice(0, i) + '<span class="cursor">▌</span>';
        i++;
        setTimeout(tick, 45);
      } else { typing = false; }
    };
    tick();
  }

  function render() {
    if (!state) return;
    const iAmSpymaster = state.mode === "human_spymaster";
    const playing = state.phase === "guessing";
    const over = state.phase === "won" || state.phase === "lost";

    $("agents").textContent = state.agentsLeft;
    $("turns").textContent = (state.turnLimit - state.turn + 1) + "/" + state.turnLimit;
    $("role").textContent = iAmSpymaster
      ? "YOU ARE THE SPYMASTER — CLAUDE GUESSES"
      : "CLAUDE IS THE SPYMASTER — YOU GUESS";
    $("txlabel").textContent = iAmSpymaster ? "YOUR TRANSMISSION" : "TRANSMISSION FROM SPYMASTER";

    const clue = state.clue;
    if (clue && playing) {
      const text = clue.word + " · " + (clue.count === 0 ? "∞" : clue.count);
      if (text !== shownClue) { shownClue = text; typeClue(text); }
    } else if (!typing) {
      shownClue = "";
      $("tx").classList.add("idle");
      let idle;
      if (over) idle = "transmission ended";
      else if (iAmSpymaster) idle = "compose your clue below…";
      else idle = "spymaster is thinking…";
      $("txline").innerHTML = idle + '<span class="cursor">▌</span>';
    }

    $("clueform").className = "clueform" + (iAmSpymaster && state.phase === "awaiting_clue" ? " show" : "");

    const grid = $("grid");
    grid.innerHTML = "";
    state.board.forEach((c) => {
      const cell = document.createElement("div");
      let cls = "card" + (c.revealed || over ? " revealed" : "");
      if (armed === c.word) cls += " armed";
      if (iAmSpymaster && !c.revealed && !over && c.identity) cls += " key-" + c.identity;
      if (over && !c.revealed && c.identity === "neutral") cls += " dim";
      cell.className = cls;
      const btn = document.createElement("button");
      btn.disabled = c.revealed || !playing || iAmSpymaster;
      btn.setAttribute("aria-label", c.word);
      const front = document.createElement("div");
      front.className = "face front";
      front.textContent = c.word;
      const back = document.createElement("div");
      back.className = "face back " + (c.identity || "");
      if (c.identity) back.innerHTML = '<span class="sym">' + SYM[c.identity] + "</span>" + c.word;
      btn.append(front, back);
      if (!iAmSpymaster) btn.addEventListener("click", () => onTap(c.word));
      cell.appendChild(btn);
      grid.appendChild(cell);
    });

    $("pass").style.display = iAmSpymaster ? "none" : "";
    $("pass").disabled = !playing || iAmSpymaster;
    if (iAmSpymaster) {
      $("hint").textContent = playing
        ? "Claude is guessing — watch the board. Guesses left: " + state.guessesLeft
        : (state.phase === "awaiting_clue" ? "Colored edges are your key: green = agent, red = assassin. Send a clue, then tell Claude in the chat." : "");
    } else {
      $("hint").textContent = playing
        ? (armed ? "Tap " + armed + " again to confirm." :
           "Guesses left: " + state.guessesLeft + ". Tap a word, tap again to confirm.")
        : (state.phase === "awaiting_clue" ? "Go back to your chat — tell Claude the turn is over." : "");
    }

    const b = $("banner");
    b.className = "banner" + (over ? " " + state.phase : "");
    if (state.phase === "won") {
      b.innerHTML = "MISSION ACCOMPLISHED<small>All agents extracted.</small>";
    } else if (state.phase === "lost") {
      b.innerHTML = "MISSION FAILED<small>" +
        (state.lostTo ? state.lostTo + " was the assassin." : "Out of clues.") + "</small>";
    }

    $("log").innerHTML = state.log.map((l) => "<div>" + l.replace(/</g, "&lt;") + "</div>").join("");
  }

  async function api(path, opts) {
    const res = await fetch("/api/room/" + encodeURIComponent(code) + path, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Request failed");
    return data;
  }

  function onTap(word) {
    if (armed !== word) { armed = word; render(); return; }
    armed = null;
    api("/guess", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ word }),
    }).then((s) => { state = s; render(); }).catch((e) => { $("hint").textContent = e.message; });
  }

  $("pass").addEventListener("click", () => {
    armed = null;
    api("/pass", { method: "POST" })
      .then((s) => { state = s; render(); })
      .catch((e) => { $("hint").textContent = e.message; });
  });

  function sendClue() {
    const clue = $("cluein").value.trim();
    if (!clue) { $("hint").textContent = "Type a clue word first."; return; }
    api("/clue", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ clue, count: parseInt(sel.value, 10) }),
    }).then((s) => {
      state = s; $("cluein").value = ""; render();
      $("hint").textContent = "Clue transmitted. Now tell Claude in the chat that it's up!";
    }).catch((e) => { $("hint").textContent = e.message; });
  }
  $("transmit").addEventListener("click", sendClue);
  $("cluein").addEventListener("keydown", (e) => { if (e.key === "Enter") sendClue(); });

  async function poll() {
    try {
      const s = await api("");
      const changed = JSON.stringify(s) !== JSON.stringify(state);
      state = s;
      if (changed) render();
    } catch (e) {
      document.querySelector(".app").innerHTML =
        '<div class="error">' + e.message + "</div>";
      clearInterval(timer);
    }
  }
  const timer = setInterval(poll, 1500);
  poll();
})();
</script>
</body>
</html>
